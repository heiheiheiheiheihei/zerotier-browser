name: Build APK & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-libzt:
    name: Compile libzt.aar
    runs-on: ubuntu-latest
    outputs:
      aar-available: ${{ steps.build.outputs.aar-available }}
    steps:
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 ndk;26.3.11579264 cmake;3.22.1'

      - name: Clone libzt
        run: |
          git clone --depth 1 https://github.com/zerotier/libzt.git
          cd libzt
          git submodule update --init --recursive

      - name: Build libzt Android AAR
        id: build
        working-directory: libzt
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "NDK contents:"
          ls "$ANDROID_NDK_HOME" | head -5
          echo "Toolchain file:"
          ls "$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" 2>/dev/null && echo "Found" || echo "Not found"

          ./build.sh android-aar "release" 2>&1

          AAR_PATH="dist/android-any-android-release/libzt-release.aar"
          if [ -f "$AAR_PATH" ]; then
            cp "$AAR_PATH" ../libzt.aar
            echo "aar-available=true" >> $GITHUB_OUTPUT
            echo "=== libzt-release.aar created successfully ==="
            echo "AAR contents:"
            unzip -l ../libzt.aar | grep "\.so"
          else
            echo "aar-available=false" >> $GITHUB_OUTPUT
            echo "=== AAR not found at $AAR_PATH ==="
            echo "dist directory:"
            find dist -type f 2>/dev/null || echo "dist not found"
            echo "Any AAR files:"
            find . -name "*.aar" 2>/dev/null || echo "No AAR found"
          fi

      - name: Upload libzt.aar artifact
        if: steps.build.outputs.aar-available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: libzt-aar
          path: libzt.aar

  build-apk:
    name: Build APK
    needs: build-libzt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download libzt.aar
        uses: actions/download-artifact@v4
        with:
          name: libzt-aar
        continue-on-error: true

      - name: Place libzt.aar (or create stub)
        run: |
          mkdir -p app/libs
          if [ -f libzt.aar ]; then
            cp libzt.aar app/libs/
            echo "=== Using REAL libzt.aar ==="
            unzip -l app/libs/libzt.aar | grep "\.so"
          else
            echo "=== Creating stub libzt.aar (build will succeed but ZT won't work) ==="
            TMPDIR=$(mktemp -d)
            printf '<manifest package="com.zerotier.libzt"/>' > $TMPDIR/AndroidManifest.xml
            cd $TMPDIR
            zip -r $GITHUB_WORKSPACE/app/libs/libzt.aar .
            cd $GITHUB_WORKSPACE
            rm -rf $TMPDIR
          fi

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.7

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon
        continue-on-error: true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        if: hashFiles('app/build/outputs/apk/release/app-release-unsigned.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk

  release:
    name: Create Release
    needs: build-apk
    runs-on: ubuntu-latest
    if: success()
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-debug

      - name: Get short SHA
        run: echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.SHORT_SHA }}
          name: "ZT Browser - Build ${{ env.SHORT_SHA }}"
          files: app-debug.apk
          draft: false
          prerelease: true
          generate_release_notes: true
