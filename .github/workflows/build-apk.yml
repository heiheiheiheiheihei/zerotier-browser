name: Build APK & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-libzt:
    name: Compile libzt.aar
    runs-on: ubuntu-latest
    outputs:
      aar-available: ${{ steps.build.outputs.aar-available }}
    steps:
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 ndk;27.0.12077973 cmake;3.22.1'

      - name: Clone libzt
        run: |
          git clone --depth 1 https://github.com/zerotier/libzt.git
          cd libzt
          git submodule update --init --recursive

      - name: Build libzt for Android
        working-directory: libzt
        run: |
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          make android || echo "LIBZT_BUILD_FAILED=true" >> $GITHUB_ENV

      - name: Collect libzt .so files
        id: build
        working-directory: libzt
        run: |
          AAR_DIR="libzt-aar-temp"
          rm -rf $AAR_DIR
          mkdir -p $AAR_DIR/jni/arm64-v8a
          mkdir -p $AAR_DIR/jni/armeabi-v7a
          mkdir -p $AAR_DIR/jni/x86_64

          SO_COUNT=0
          find . -name "libzt.so" | while read f; do
            case "$f" in
              *arm64-v8a*) cp "$f" "$AAR_DIR/jni/arm64-v8a/" ; SO_COUNT=$((SO_COUNT+1)) ;;
              *armeabi-v7a*) cp "$f" "$AAR_DIR/jni/armeabi-v7a/" ; SO_COUNT=$((SO_COUNT+1)) ;;
              *x86_64*) cp "$f" "$AAR_DIR/jni/x86_64/" ; SO_COUNT=$((SO_COUNT+1)) ;;
            esac
          done
          echo "Found $SO_COUNT .so files"

          # Minimal manifest
          cat > $AAR_DIR/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.zerotier.libzt">
          </manifest>
          EOF

          cd $AAR_DIR
          zip -r ../libzt.aar . || true
          cd ..
          rm -rf $AAR_DIR

          if [ -f libzt.aar ]; then
            echo "aar-available=true" >> $GITHUB_OUTPUT
            echo "libzt.aar created successfully"
          else
            echo "aar-available=false" >> $GITHUB_OUTPUT
            echo "libzt.aar creation failed"
          fi

      - name: Upload libzt.aar artifact
        if: steps.build.outputs.aar-available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: libzt-aar
          path: libzt/libzt.aar

  build-apk:
    name: Build APK
    needs: build-libzt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download libzt.aar
        uses: actions/download-artifact@v4
        with:
          name: libzt-aar
        continue-on-error: true

      - name: Place libzt.aar (or create stub)
        run: |
          mkdir -p app/libs
          if [ -f libzt.aar ]; then
            cp libzt.aar app/libs/
            echo "Using real libzt.aar"
          else
            echo "Creating stub libzt.aar for build testing..."
            # Stub: minimal valid AAR to satisfy Gradle dependency resolution
            TMPDIR=$(mktemp -d)
            cat > $TMPDIR/AndroidManifest.xml << 'EOF'
            <manifest xmlns:android="http://schemas.android.com/apk/res/android"
                package="com.zerotier.libzt">
            </manifest>
            EOF
            cd $TMPDIR
            zip -r $GITHUB_WORKSPACE/app/libs/libzt.aar .
            cd $GITHUB_WORKSPACE
            rm -rf $TMPDIR
          fi

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.7

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon
        continue-on-error: true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        if: hashFiles('app/build/outputs/apk/release/app-release-unsigned.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk

  release:
    name: Create Release
    needs: build-apk
    runs-on: ubuntu-latest
    if: success()
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-debug

      - name: Get short SHA
        run: echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.SHORT_SHA }}
          name: "ZT Browser - Build ${{ env.SHORT_SHA }}"
          files: app-debug.apk
          draft: false
          prerelease: true
          generate_release_notes: true
